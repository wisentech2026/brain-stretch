<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>换换脑子 · Brain Stretch</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Noto+Serif+SC:wght@300;400;500;700&family=LXGW+WenKai+TC:wght@300;400&display=swap');

:root{
  --bg:#14110d; --ink:#ece7dd; --dim:#8a8377; --line:#322d26;
  --go:#c9b88a; --good:#86a37d; --warn:#cf6a55;
  /* Emil-style spring easings */
  --spring:cubic-bezier(0.32, 0.72, 0, 1);
  --spring-out:cubic-bezier(0.16, 1, 0.3, 1);
  --spring-soft:cubic-bezier(0.34, 1.56, 0.64, 1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{
  background:radial-gradient(120% 100% at 50% 0%, #1f1b15 0%, var(--bg) 70%);
  color:var(--ink); font-family:'Noto Serif SC',serif;
  display:flex;align-items:center;justify-content:center;overflow:hidden;user-select:none;
}
#noise{position:fixed;inset:0;pointer-events:none;opacity:.035;z-index:1}
.app{width:min(480px,100vw);height:100dvh;position:relative;z-index:2;display:flex;flex-direction:column}

.screen{position:absolute;inset:0;display:none;flex-direction:column;padding:2rem 1.6rem;animation:fade .42s var(--spring-out)}
.screen.on{display:flex}
#home.on{display:block;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:8rem}
#home::-webkit-scrollbar{display:none}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* sound toggle (global) */
/* AdSense Anchor Ad — fixed bottom, dismissible, mobile-style */
.anchor-ad{
  position:fixed;left:0;right:0;bottom:0;z-index:60;
  height:64px;
  background:#1a1813;
  border-top:1px solid #2e2820;
  display:flex;align-items:center;padding:0 .75rem 0 .85rem;gap:.75rem;
  transform:translateY(0);transition:transform .35s var(--spring-out);
  box-shadow:0 -4px 20px rgba(0,0,0,.3);
}
.anchor-ad.hidden{transform:translateY(100%)}
.anchor-ad-label{position:absolute;top:-1px;left:.6rem;transform:translateY(-100%);
  font-size:.55rem;letter-spacing:.25em;color:#5a544a;text-transform:uppercase;
  background:#1a1813;padding:.2rem .5rem;border-radius:3px 3px 0 0;border:1px solid #2e2820;border-bottom:none}
.anchor-ad-close{
  position:absolute;top:50%;right:.5rem;transform:translateY(-50%);
  width:22px;height:22px;border-radius:50%;border:none;
  background:rgba(255,255,255,.08);color:#a59c87;font-size:1rem;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;padding:0;
  transition:background .2s
}
.anchor-ad-close:hover{background:rgba(255,255,255,.16);color:#ece7dd}
.anchor-ad-img{width:44px;height:44px;border-radius:6px;background:linear-gradient(135deg,#3a352b,#262218);flex-shrink:0}
.anchor-ad-content{display:flex;align-items:center;gap:.7rem;flex:1;min-width:0;margin-right:1.8rem}
.anchor-ad-tx{flex:1;min-width:0}
.anchor-ad-title{font-size:.85rem;color:#c4bdb0;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.anchor-ad-desc{font-size:.66rem;color:#7a746a;line-height:1.3;margin-top:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* leave room above anchor ad so it doesn't cover content */
.app{padding-bottom:64px}
.anchor-ad.hidden ~ .app{padding-bottom:0}
.sound{position:fixed;top:1rem;right:1rem;z-index:50;width:38px;height:38px;border-radius:50%;
  border:1px solid var(--line);background:rgba(20,18,14,.6);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:transform .3s var(--spring-out),border-color .25s;will-change:transform}
.sound:hover{border-color:#46402f;transform:scale(1.05)}
.sound:active{transform:scale(.92);transition-duration:.08s}
.sound svg{width:18px;height:18px}

/* ---------- HOME ---------- */
.brand{margin-top:3rem;text-align:center}
.brand .zh{
  font-family:'Fraunces','Noto Serif SC',serif;
  font-weight:400;
  font-size:2.85rem;
  letter-spacing:.05em;
  line-height:1.2;
  white-space:nowrap;
}
.brand .en{font-size:.62rem;letter-spacing:.42em;text-transform:uppercase;color:var(--dim);margin-top:.85rem;white-space:nowrap}
.tagline{text-align:center;color:#b8b1a3;font-size:.95rem;line-height:1.8;margin:1.8rem auto 0;max-width:30ch}
.tagline b{color:var(--ink);font-weight:500}

.profilebar{display:flex;align-items:center;justify-content:center;gap:.4rem;margin-top:1.7rem;font-size:.8rem;color:var(--dim)}
.trendlink-top{display:flex;align-items:center;gap:.45rem;color:var(--go);cursor:pointer;font-size:.85rem;transition:opacity .2s}
.trendlink-top:hover{opacity:.75}

.cards-wrap{position:relative;margin-top:1.8rem}
.cards{display:flex;flex-direction:column;gap:1rem;margin-top:1.8rem}

/* BMC and ads now live inside the scroll area, at the very bottom */
.cards-footer{display:flex;flex-direction:column;align-items:center;gap:1.4rem;padding-top:2rem;padding-bottom:1rem}
.legal{display:flex;flex-direction:column;align-items:center;gap:.5rem;margin-top:.5rem}
.legal .links{display:flex;align-items:center}
.legal a{color:var(--dim);font-size:.72rem;text-decoration:none;transition:color .2s}
.legal a:hover{color:var(--ink)}
.legal .dot{color:#46402f;margin:0 .5rem;font-size:.72rem}
.legal .rights{color:#5a544a;font-size:.66rem;letter-spacing:.05em;margin-top:.3rem}

/* Buy Me a Coffee link */
.bmc{display:inline-flex;align-items:center;gap:.5rem;font-size:.82rem;color:#1a1610;text-decoration:none;padding:.7rem 1.4rem;border-radius:30px;background:var(--go);font-weight:500;transition:transform .3s var(--spring-out),background .25s}
.bmc:hover{background:#d6c595;transform:translateY(-1px)}
.bmc:active{transform:translateY(0) scale(.97);transition-duration:.08s}
.bmc svg{opacity:1}

/* Ad slot */
.ads-slot{width:100%;max-width:340px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.012);padding:.85rem .95rem;display:flex;flex-direction:column;gap:.5rem}
.ads-label{font-size:.55rem;letter-spacing:.3em;color:#5a544a;text-transform:uppercase;text-align:left}
.ads-mock{display:flex;align-items:center;gap:.7rem}
.ads-mock-img{width:46px;height:46px;border-radius:6px;background:linear-gradient(135deg,#3a352b,#262218);flex-shrink:0}
.ads-mock-tx{flex:1;text-align:left;min-width:0}
.ads-mock-title{font-size:.82rem;color:#a59c87;line-height:1.3}
.ads-mock-desc{font-size:.7rem;color:#6e6759;line-height:1.4;margin-top:.15rem}
.ads-mock-tag{font-size:.55rem;color:#5a544a;letter-spacing:.15em;text-transform:uppercase;align-self:flex-start;margin-top:.2rem}
.card{border:1px solid var(--line);border-radius:18px;padding:1.25rem 1.3rem;display:flex;align-items:center;gap:1.2rem;
  cursor:pointer;transition:transform .25s var(--spring-out),border-color .2s var(--spring),background .2s var(--spring);
  background:rgba(255,255,255,.012);position:relative;will-change:transform}
.card.live:hover{border-color:#52492f;background:rgba(201,184,138,.06);transform:translateY(-1px)}
.card.live:active{transform:translateY(0) scale(.985);transition-duration:.08s}
.card .ic{width:40px;height:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.card .tx{flex:1;min-width:0;overflow:hidden}
.card .tx h3{font-family:'Fraunces','Noto Serif SC',serif;font-weight:400;font-size:1.2rem;margin-bottom:.35rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .tx p{font-size:.72rem;color:var(--dim);line-height:1.5;letter-spacing:.18em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .tx .how{color:#837c70;letter-spacing:.04em;margin-left:.5em}
.card .best{font-size:.62rem;color:var(--go);margin-top:.3rem;letter-spacing:.05em}
.card .soon{font-size:.6rem;letter-spacing:.2em;color:var(--dim);border:1px solid var(--line);padding:.2rem .5rem;border-radius:20px}
.card.locked{opacity:.4;cursor:default}

.trendlink{font-size:.92rem;color:var(--go);cursor:pointer;display:flex;align-items:center;gap:.5rem;transition:opacity .2s}
.trendlink:hover{opacity:.8}
.homenote{text-align:center;font-size:.7rem;color:var(--dim);line-height:1.6}

/* ---------- game shell ---------- */
.top{display:flex;align-items:center;justify-content:space-between;height:2.4rem}
.back{font-size:1.5rem;color:var(--dim);cursor:pointer;width:2rem;line-height:1;transition:color .2s,transform .25s var(--spring-out)}
.back:hover{color:var(--ink);transform:translateX(-2px)}
.gtitle{font-family:'Fraunces',serif;font-size:.8rem;letter-spacing:.25em;text-transform:uppercase;color:var(--dim)}
.livestat{font-family:'Fraunces',serif;font-size:.95rem;color:var(--go);min-width:3rem;text-align:right}
.timebar{height:2px;background:var(--line);border-radius:2px;margin-top:.4rem;overflow:hidden}
.timebar i{display:block;height:100%;background:var(--go);width:100%}
.gbody{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}

.rules{max-width:30ch}
.rules h2{font-family:'Fraunces',serif;font-weight:300;font-size:1.9rem;margin-bottom:1.2rem;line-height:1.2}
.rules .demo{margin:1.5rem 0;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.7rem}
.rules p{font-size:.95rem;line-height:1.75;color:#bdb6aa}
.rules .hint{font-size:.8rem;color:var(--dim);margin-top:1rem}

.btn{font-family:'Fraunces',serif;background:none;border:1px solid var(--line);color:var(--ink);
  padding:.85rem 2.2rem;font-size:1rem;letter-spacing:.04em;cursor:pointer;border-radius:30px;
  transition:transform .3s var(--spring-out),letter-spacing .3s var(--spring),border-color .25s,background .25s,box-shadow .3s var(--spring);
  margin-top:1.5rem;position:relative;overflow:hidden;will-change:transform}
.btn:hover{letter-spacing:.1em;border-color:#52492f;transform:translateY(-1px)}
.btn:active{transform:translateY(0) scale(.97);transition-duration:.08s}
.btn.primary{background:var(--go);color:#1a1610;border-color:var(--go)}
.btn.primary:hover{background:#d6c595;box-shadow:0 6px 24px rgba(201,184,138,.25);transform:translateY(-1px)}

.countbig{font-family:'Fraunces',serif;font-size:6rem;font-weight:300;color:var(--go);animation:pop .65s var(--spring-out)}
@keyframes pop{from{opacity:0;transform:scale(1.35)}to{opacity:1;transform:scale(1)}}

/* go/no-go */
.glyph{font-family:'Fraunces',serif;font-weight:300;font-size:6rem;line-height:1;transition:opacity .1s,transform .1s}
.ring{position:absolute;width:210px;height:210px;border-radius:50%;border:1px solid var(--line);transition:border-color .15s;will-change:border-color}
.ring.ok{border-color:var(--good)}
.ring.bad{border-color:var(--warn)}
.cuewrap{position:relative;display:flex;align-items:center;justify-content:center;width:210px;height:210px}
/* ripple */
.ripple{position:absolute;border-radius:50%;border:1.5px solid var(--go);pointer-events:none;animation:rip .5s ease-out forwards;will-change:width,height,opacity}
@keyframes rip{from{width:40px;height:40px;opacity:.7}to{width:230px;height:230px;opacity:0}}
.tap-hint{margin-top:2.4rem;font-size:.86rem;color:var(--dim)}
kbd{font-family:'Fraunces',serif;border:1px solid var(--line);padding:.12rem .55rem;border-radius:4px;font-size:.82rem}

/* stroop */
.stroopword{font-family:'Noto Serif SC';font-weight:500;font-size:5rem;line-height:1;margin-bottom:.5rem;transition:transform .12s}
.swatches{display:flex;gap:.8rem;margin-top:2.4rem;flex-wrap:wrap;justify-content:center}
.swatch{width:62px;height:62px;border-radius:12px;cursor:pointer;border:2px solid rgba(255,255,255,.08);
  transition:transform .35s var(--spring-soft),box-shadow .25s var(--spring);will-change:transform}
.swatch:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.4)}
.swatch:active{transform:translateY(0) scale(.9);transition-duration:.08s}
.swatch.flash{animation:swflash .35s}
@keyframes swflash{0%{box-shadow:0 0 0 0 rgba(255,255,255,.6)}100%{box-shadow:0 0 0 14px rgba(255,255,255,0)}}
.qlabel{font-size:.82rem;color:var(--dim);letter-spacing:.1em;margin-bottom:1.3rem}

/* anchor */
.anchor{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,var(--go) 0%,rgba(201,184,138,.15) 60%,transparent 70%);animation:breathe 8s ease-in-out infinite;will-change:transform,opacity;transform:translateZ(0)}
@keyframes breathe{0%,100%{transform:scale(.55);opacity:.6}50%{transform:scale(1);opacity:1}}
.anchor-hint{margin-top:2.6rem;font-size:.85rem;color:var(--dim);line-height:1.7;max-width:26ch}
.wander-btn{margin-top:1.4rem;font-size:.8rem;color:var(--go);border:1px solid var(--line);background:none;padding:.6rem 1.4rem;border-radius:30px;cursor:pointer;transition:transform .3s var(--spring-out),border-color .25s,background .25s;will-change:transform}
.wander-btn:hover{border-color:var(--go);transform:translateY(-1px)}
.wander-btn:active{transform:translateY(0) scale(.94);transition-duration:.08s}

/* n-back */
.nb-glyph{font-family:'Fraunces',serif;font-weight:300;font-size:6rem;line-height:1;color:var(--ink);transition:opacity .12s,color .12s}
.nb-prev{position:absolute;top:-3rem;font-family:'Fraunces',serif;font-size:1.4rem;color:var(--dim);opacity:.55}
.nb-prev-label{position:absolute;top:-4.5rem;font-size:.62rem;letter-spacing:.25em;color:var(--dim);text-transform:uppercase}
.nb-wrap{position:relative;display:flex;align-items:center;justify-content:center;width:210px;height:210px}

/* visual search */
.vs-grid{display:grid;gap:.6rem;padding:1rem;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.012)}
.vs-cell{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:1.5rem;color:#a59c87;cursor:pointer;transition:transform .25s var(--spring-soft),color .2s;user-select:none;will-change:transform}
.vs-cell:active{transform:scale(.82);transition-duration:.08s}
.vs-progress{font-size:.78rem;color:var(--dim);letter-spacing:.18em;margin-top:1.4rem}

/* breathing — uses the same orb visual as anchor, with a 4-7-8 keyframe */
.br-orb-anim{
  width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,var(--go) 0%,rgba(201,184,138,.15) 60%,transparent 70%);
  animation:breathe478 19s cubic-bezier(.45,.05,.55,.95) infinite;
  will-change:transform,opacity;transform:translateZ(0);
}
@keyframes breathe478{
  0%   {transform:scale(.35);opacity:.55}   /* 起始（呼完） */
  21%  {transform:scale(1);   opacity:1}    /* 吸气结束 4s = 4/19 = 21% */
  58%  {transform:scale(1);   opacity:1}    /* 屏气结束 4+7=11s = 58% */
  100% {transform:scale(.35); opacity:.55}  /* 呼气结束 19s = 100% */
}
.br-phase{font-family:'Fraunces',serif;font-size:1.05rem;color:var(--go);letter-spacing:.2em;margin-top:2.4rem}
.br-cycle{margin-top:.8rem;font-size:.78rem;color:var(--dim);letter-spacing:.18em}

/* result */
.result{text-align:center;max-width:32ch}
.r-eyebrow{font-size:.66rem;letter-spacing:.35em;text-transform:uppercase;color:var(--dim);margin-bottom:1rem}
.r-big{font-family:'Fraunces',serif;font-weight:300;font-size:4.5rem;color:var(--go);line-height:1;animation:rbig .7s var(--spring-soft)}
@keyframes rbig{0%{opacity:0;transform:scale(.7)}60%{opacity:1;transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}
.r-grid{display:flex;gap:2rem;justify-content:center;margin:1.8rem 0}
.r-grid div span{display:block;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:.4rem}
.r-grid div b{font-family:'Fraunces',serif;font-weight:300;font-size:1.8rem}
.delta{font-size:.7rem;margin-top:.3rem}
.delta.up{color:var(--good)}.delta.down{color:var(--dim)}
.handoff{font-size:1rem;line-height:1.7;color:#c4bdb0;margin:1.4rem 0;font-style:italic}
.r-actions{display:flex;flex-direction:column;gap:.7rem;align-items:center}
.link{font-size:.8rem;color:var(--dim);cursor:pointer;margin-top:.3rem;border-bottom:1px solid transparent;padding-bottom:2px}
.link:hover{border-color:var(--dim)}

/* trend page */
.trendwrap{flex:1;overflow-y:auto;padding-top:1rem}
.trend-h{font-family:'Fraunces',serif;font-weight:300;font-size:1.8rem;margin-bottom:.3rem}
.trend-sub{font-size:.8rem;color:var(--dim);margin-bottom:1.8rem}
.tcard{border:1px solid var(--line);border-radius:14px;padding:1.1rem 1.2rem;margin-bottom:1rem}
.tcard h4{font-family:'Fraunces',serif;font-weight:400;font-size:1rem;margin-bottom:.2rem;display:flex;justify-content:space-between}
.tcard h4 b{color:var(--go);font-weight:400}
.tcard .meta{font-size:.72rem;color:var(--dim);margin-bottom:.9rem}
.spark{width:100%;height:54px}
.empty{text-align:center;color:var(--dim);font-size:.86rem;line-height:1.8;padding:3rem 1rem}

/* login */
.login{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.login h2{font-family:'Fraunces',serif;font-weight:300;font-size:2rem;margin-bottom:.8rem}
.login p{font-size:.9rem;color:var(--dim);line-height:1.7;max-width:28ch;margin-bottom:2rem}
.authbtn{display:flex;align-items:center;justify-content:center;gap:.7rem;width:min(280px,80vw);padding:.85rem;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.02);cursor:pointer;margin-bottom:.8rem;font-size:.92rem;
  transition:transform .3s var(--spring-out),border-color .25s,background .25s;will-change:transform}
.authbtn:hover{border-color:#52492f;background:rgba(255,255,255,.04);transform:translateY(-1px)}
.authbtn:active{transform:translateY(0) scale(.98);transition-duration:.08s}
.authnote{font-size:.72rem;color:var(--dim);margin-top:1.2rem;line-height:1.6;max-width:26ch}
.skip{margin-top:1.5rem;font-size:.82rem;color:var(--dim);cursor:pointer;border-bottom:1px solid transparent}
.skip:hover{border-color:var(--dim)}
</style>
</head>
<body>
<canvas id="noise"></canvas>
<div class="sound" id="soundBtn" title="Sound"></div>
<div class="app">

  <!-- HOME -->
  <section class="screen on" id="home">
    <div class="brand">
      <div class="zh" id="brandZh"></div>
      <div class="en" id="brandEn"></div>
    </div>
    <p class="tagline" id="tagline"></p>
    <div class="profilebar" id="profilebar"></div>
    <div class="cards" id="cards"></div>
  </section>

  <!-- GAME -->
  <section class="screen" id="game">
    <div class="top">
      <div class="back" onclick="App.home()">‹</div>
      <div class="gtitle" id="g-title"></div>
      <div class="livestat" id="g-live"></div>
    </div>
    <div class="timebar" id="timebar" style="visibility:hidden"><i id="timefill"></i></div>
    <div class="gbody" id="gbody"></div>
  </section>

  <!-- TREND -->
  <section class="screen" id="trend">
    <div class="top"><div class="back" onclick="App.home()">‹</div><div class="gtitle" id="trendTitle"></div><div style="width:2rem"></div></div>
    <div class="trendwrap" id="trendwrap"></div>
  </section>

  <!-- LOGIN -->
  <section class="screen" id="login">
    <div class="top"><div class="back" onclick="App.home()">‹</div><div class="gtitle" id="loginTitle"></div><div style="width:2rem"></div></div>
    <div class="login">
      <h2 id="loginH"></h2>
      <p id="loginP"></p>
      <div class="authbtn" onclick="Auth.mock('google')">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.6 9.2c0-.6-.1-1.2-.2-1.8H9v3.4h4.8c-.2 1.1-.8 2-1.8 2.6v2.2h2.9c1.7-1.6 2.7-3.9 2.7-6.4z"/><path fill="#34A853" d="M9 18c2.4 0 4.5-.8 6-2.2l-2.9-2.2c-.8.5-1.8.9-3.1.9-2.4 0-4.4-1.6-5.1-3.8H.9v2.3C2.4 15.9 5.5 18 9 18z"/><path fill="#FBBC05" d="M3.9 10.7c-.2-.5-.3-1.1-.3-1.7s.1-1.2.3-1.7V5H.9C.3 6.2 0 7.5 0 9s.3 2.8.9 4l3-2.3z"/><path fill="#EA4335" d="M9 3.6c1.3 0 2.5.5 3.4 1.3l2.6-2.6C13.5.9 11.4 0 9 0 5.5 0 2.4 2.1.9 5l3 2.3C4.6 5.2 6.6 3.6 9 3.6z"/></svg>
        <span id="loginGoogle"></span>

/* ===================== AUDIO ENGINE (Web Audio, no files) ===================== */
const Sound={
  ctx:null, on:true, noiseNode:null, noiseGain:null,
  init(){ if(this.ctx)return; try{this.ctx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} },
  resume(){ if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume(); },
  // short click "tick" — woodblock-ish
  click(){ if(!this.on||!this.ctx)return; this.resume();
    const t=this.ctx.currentTime, o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type='triangle'; o.frequency.setValueAtTime(420,t); o.frequency.exponentialRampToValueAtTime(180,t+.06);
    g.gain.setValueAtTime(.18,t); g.gain.exponentialRampToValueAtTime(.001,t+.09);
    o.connect(g).connect(this.ctx.destination); o.start(t); o.stop(t+.1);
  },
  good(){ if(!this.on||!this.ctx)return; this.resume();
    const t=this.ctx.currentTime;[660,990].forEach((f,i)=>{const o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,t+i*.05);g.gain.linearRampToValueAtTime(.12,t+i*.05+.01);
      g.gain.exponentialRampToValueAtTime(.001,t+i*.05+.18);o.connect(g).connect(this.ctx.destination);o.start(t+i*.05);o.stop(t+i*.05+.2);});
  },
  bad(){ if(!this.on||!this.ctx)return; this.resume();
    const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type='sawtooth';o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(70,t+.18);
    g.gain.setValueAtTime(.14,t);g.gain.exponentialRampToValueAtTime(.001,t+.22);
    o.connect(g).connect(this.ctx.destination);o.start(t);o.stop(t+.24);
  },
  // ambient: 'waves' or 'bamboo' — filtered noise, slowly modulated
  startAmbient(kind){ if(!this.ctx)return; this.resume(); this.stopAmbient();
    const bufSize=this.ctx.sampleRate*2, buf=this.ctx.createBuffer(1,bufSize,this.ctx.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++)d[i]=Math.random()*2-1;
    const src=this.ctx.createBufferSource(); src.buffer=buf; src.loop=true;
    const filter=this.ctx.createBiquadFilter();
    const g=this.ctx.createGain(); g.gain.value=0;
    if(kind==='waves'){ filter.type='lowpass'; filter.frequency.value=500;
      // slow swell LFO on gain to mimic waves
      const lfo=this.ctx.createOscillator(), lg=this.ctx.createGain();
      lfo.frequency.value=0.12; lg.gain.value=.06; lfo.connect(lg).connect(g.gain); lfo.start(); this._lfo=lfo;
      g.gain.value=.10;
    } else { // bamboo wind: higher, airier
      filter.type='bandpass'; filter.frequency.value=1200; filter.Q.value=.6;
      const lfo=this.ctx.createOscillator(), lg=this.ctx.createGain();
      lfo.frequency.value=0.2; lg.gain.value=400; lfo.connect(lg).connect(filter.frequency); lfo.start(); this._lfo=lfo;
      g.gain.value=.07;
    }
    src.connect(filter).connect(g).connect(this.ctx.destination); src.start();
    this.noiseNode=src; this.noiseGain=g;
  },
  stopAmbient(){ try{ if(this.noiseNode){this.noiseGain.gain.linearRampToValueAtTime(0,this.ctx.currentTime+.4);
    const n=this.noiseNode;setTimeout(()=>{try{n.stop();}catch(e){}},450);this.noiseNode=null;}
    if(this._lfo){try{this._lfo.stop();}catch(e){}this._lfo=null;} }catch(e){} },
  toggle(){ this.on=!this.on; if(!this.on)this.stopAmbient(); renderSoundBtn(); }
};

const _mem={};
const store={ get:k=>_mem[k]??null, set:(k,v)=>{_mem[k]=v;} };
const DB={
  add(game,score){ const k='scores_'+game; const arr=store.get(k)||[]; arr.push({t:Date.now(),v:score}); store.set(k,arr); return arr; },
  all(game){ return store.get('scores_'+game)||[]; },
  best(game){ const a=this.all(game); return a.length?Math.max(...a.map(x=>x.v)):null; },
  last(game){ const a=this.all(game); return a.length?a[a.length-1].v:null; },
  prev(game){ const a=this.all(game); return a.length>1?a[a.length-2].v:null; },
};

const GNG={
  rules(){ const b=$('#gbody');b.innerHTML='';
    const r=el('div','rules');
    const R=T.gngRules;
    r.innerHTML=`<h2>${R.h}</h2><div class="demo" id="gng-demo"></div>

      <div class="hint">${R.hint}</div>`;
    b.appendChild(r);
    const btn=el('button','btn primary',T.rulesStart); btn.onclick=()=>GNG.start(); r.appendChild(btn);
    const d=$('#gng-demo');let i=0;
    const demo=T.gngDemo;
    const colors=['var(--good)','var(--warn)','var(--good)'];
    const play=()=>{const[n,l]=demo[i%3];const c=colors[i%3];
      d.innerHTML=`<div style="font-family:Fraunces;font-size:3.2rem;color:${c}">${n}</div><div style="font-size:.85rem;color:${c};letter-spacing:.1em">${l}</div>`;
      i++;window._to=setTimeout(play,1100);};play();
  },
  start(){ clearAll(); Sound.click(); const b=$('#gbody');b.innerHTML=''; lead(b,()=>GNG.run()); },
  run(){ const b=$('#gbody');b.innerHTML='';
    const wrap=el('div','cuewrap'); const ring=el('div','ring'); const g=el('div','glyph','·');
    wrap.appendChild(ring); wrap.appendChild(g); b.appendChild(wrap);
    b.appendChild(el('div','tap-hint',T.gngRules.tapHint));
    let goC=0,goT=0,stopC=0,stopT=0,rts=[],isStop=false,await_=false,shown=0,done=false,resp=false;
    const T0=performance.now();
    const updLive=()=>{const tot=goT+stopT;if(tot)$('#g-live').textContent=Math.round((goC+stopC)/tot*100)+'%';};
    function next(){ if(done)return;
      isStop=Math.random()<.27; const n=isStop?3:[1,2,4,5,6,7,8,9][Math.floor(Math.random()*8)];
      await_=true;resp=false; g.textContent=n;g.style.opacity=1;g.style.color='var(--ink)';g.style.transform='scale(1)';
      shown=performance.now(); isStop?stopT++:goT++;
      window._to=setTimeout(resolve,Math.max(560,820-(performance.now()-T0)/120));
    }
    function respond(){ if(!await_||resp||done)return; resp=true; spawnRipple(wrap);
      if(isStop){ring.className='ring bad';g.style.color='var(--warn)';Sound.bad();buzz([30,40,30]);}
      else{ring.className='ring ok';goC++;rts.push(performance.now()-shown);Sound.click();buzz(15);}
      setTimeout(()=>ring.className='ring',280); updLive();
    }
    function resolve(){ await_=false; if(isStop&&!resp){stopC++;} updLive(); g.style.opacity=.12; window._to=setTimeout(next,330); }
    function end(){ done=true;
      const inhib=stopT?Math.round(stopC/stopT*100):100;
      const rt=rts.length?Math.round(rts.reduce((a,c)=>a+c,0)/rts.length):0;
      const acc=Math.round(((goC+stopC)/(goT+stopT))*100)||0;
      const E=T.gngEnd;
      let h; if(inhib>=85)h=E.good; else if(inhib<60)h=E.bad; else h=E.mid;
      result({eyebrow:E.eyebrow,big:acc+'%',
        stats:[[E.s1,acc+'%'],[E.s2,inhib+'%'],[E.s3,rt+'ms']],handoff:h,gameId:'gng',scoreVal:acc});
    }
    window._key=e=>{if(e.code==='Space'){e.preventDefault();respond();}};
    document.addEventListener('keydown',window._key); $('#gbody').onpointerdown=respond;
    timer(SEC,end); next();
  }
};

  run(){ const b=$('#gbody');b.innerHTML='';

    b.appendChild(lab);b.appendChild(word);b.appendChild(sw);
    const C=T.stroopColors; let inkColor,total=0,correct=0,conRT=[],neuRT=[],shown=0,conflict=false,done=false;
    C.forEach(([nm,hex])=>{const s=el('div','swatch');s.style.background=hex;s.dataset.hex=hex;s.onclick=()=>pick(hex,s);sw.appendChild(s);});
    const updLive=()=>{if(total)$('#g-live').textContent=Math.round(correct/total*100)+'%';};
    function nextWord(){ if(done)return; const wi=Math.floor(Math.random()*4);
      let ci=Math.random()<.7?(wi+1+Math.floor(Math.random()*3))%4:wi; conflict=ci!==wi;
      word.textContent=C[wi][0]; word.style.color=C[ci][1]; inkColor=C[ci][1]; shown=performance.now();
    }
    function pick(hex,node){ if(done)return; total++; const rt=performance.now()-shown;
      node.classList.add('flash'); setTimeout(()=>node.classList.remove('flash'),350);
      if(hex===inkColor){correct++;(conflict?conRT:neuRT).push(rt);word.style.transform='scale(1.1)';setTimeout(()=>word.style.transform='',120);Sound.click();buzz(15);}
      else{word.style.opacity=.3;setTimeout(()=>word.style.opacity=1,150);Sound.bad();buzz([30,40,30]);}
      updLive(); nextWord();
    }
    function end(){ done=true; const acc=total?Math.round(correct/total*100):0;
      const cAvg=conRT.length?conRT.reduce((a,c)=>a+c,0)/conRT.length:0;
      const nAvg=neuRT.length?neuRT.reduce((a,c)=>a+c,0)/neuRT.length:0;
      const eff=(cAvg&&nAvg)?Math.max(0,Math.round(cAvg-nAvg)):0;
      const E=T.stroopEnd;
      let h; if(acc>=90&&eff<150)h=E.good; else if(acc<70)h=E.bad; else h=E.mid;
      result({eyebrow:E.eyebrow,big:acc+'%',
        stats:[[E.s1,acc+'%'],[E.s2,total],[E.s3,eff+'ms']],handoff:h,gameId:'stroop',scoreVal:acc});
    }
    nextWord(); timer(SEC,end);

const NBack={
  rules(){ const b=$('#gbody');b.innerHTML='';
    const r=el('div','rules');

    r.innerHTML=`<h2>${R.h}</h2>
      <div class="demo" id="nb-demo"></div>

      <div class="hint">${R.hint}</div>`;
    b.appendChild(r);
    const btn=el('button','btn primary',T.rulesStart); btn.onclick=()=>NBack.start(); r.appendChild(btn);
    const d=$('#nb-demo'); let i=0;
    const matchTxt=T.nbackDemoMatch;
    const seq=[['4','—',false],['7','—',false],['7',matchTxt,true],['2','—',false]];
    const play=()=>{const[n,l,isMatch]=seq[i%4];
      d.innerHTML=`<div style="font-family:Fraunces;font-size:3.2rem;color:${isMatch?'var(--good)':'var(--ink)'}">${n}</div>
        <div style="font-size:.78rem;color:${isMatch?'var(--good)':'var(--dim)'};letter-spacing:.08em">${l}</div>`;
      i++;window._to=setTimeout(play,1300);};play();
  },
  start(){ clearAll(); Sound.click(); const b=$('#gbody');b.innerHTML=''; lead(b,()=>NBack.run()); },
  run(){ const b=$('#gbody');b.innerHTML='';
    const wrap=el('div','nb-wrap');
    const lab=el('div','nb-prev-label',T.nbackRules.prevLabel);
    const prev=el('div','nb-prev','·');
    const cur=el('div','nb-glyph','·');
    wrap.appendChild(lab); wrap.appendChild(prev); wrap.appendChild(cur);
    b.appendChild(wrap);
    b.appendChild(el('div','tap-hint',T.nbackRules.tapHint));

    let history=[null], hits=0,hitTotal=0,misses=0,miss=0,fa=0, done=false, awaiting=false, isMatch=false, responded=false;
    function next(){
      if(done)return;
      const last=history[history.length-1];
      let n;
      if(last!=null && Math.random()<0.35){ n=last; isMatch=true; hitTotal++; }
      else {
        do { n=1+Math.floor(Math.random()*9); } while(last!=null && n===last && Math.random()<0.9);
        isMatch=(n===last);
        if(isMatch) hitTotal++;
      }
      prev.textContent = last==null?'·':last;
      cur.textContent=n; cur.style.opacity=1; cur.style.color='var(--ink)';
      history.push(n);
      awaiting=true; responded=false;
      const updLive=()=>{const tot=hits+misses+miss+fa; if(tot)$('#g-live').textContent=Math.round((hits+misses)/tot*100)+'%';};
      window._to=setTimeout(()=>{
        awaiting=false;
        if(isMatch && !responded){ miss++; cur.style.color='var(--dim)'; }
        else if(!isMatch && !responded){ misses++; }
        updLive();
        cur.style.opacity=.18;
        window._to=setTimeout(next,420);
      }, 2000);
    }
    function respond(){ if(!awaiting||responded||done)return; responded=true;
      if(isMatch){ hits++; Sound.good(); buzz(15); cur.style.color='var(--good)'; }
      else { fa++; Sound.bad(); buzz([30,40,30]); cur.style.color='var(--warn)'; }
      const tot=hits+misses+miss+fa; if(tot)$('#g-live').textContent=Math.round((hits+misses)/tot*100)+'%';
    }
    function end(){ done=true;
      const tot=hits+misses+miss+fa;
      const acc=tot?Math.round((hits+misses)/tot*100):0;
      const hitRate=hitTotal?Math.round(hits/hitTotal*100):0;
      const E=T.nbackEnd;
      let h;
      if(hitRate>=80 && fa<=2) h=E.good;
      else if(hitRate<50) h=E.bad;
      else h=E.mid;
      result({eyebrow:E.eyebrow,big:acc+'%',
        stats:[[E.s1,acc+'%'],[E.s2,hitRate+'%'],[E.s3,fa]],handoff:h,gameId:'nback',scoreVal:acc});
    }
    window._key=e=>{if(e.code==='Space'){e.preventDefault();respond();}};
    document.addEventListener('keydown',window._key); $('#gbody').onpointerdown=respond;
    timer(SEC,end); next();
  }
};

    const PAIRS=[['E','F'],['O','Q'],['M','N'],['C','G'],['P','R'],['V','Y'],['B','D'],['L','I']];
    let qIdx=0, correct=0, total=10, times=[], qStart=0, done=false, targetCell=null;
    function makeQ(){
      if(done)return;
      grid.innerHTML='';
      const size=qIdx<3?3:qIdx<6?4:5;
      grid.style.gridTemplateColumns=`repeat(${size},32px)`;
      const total_=size*size;
      const [a,b_]=PAIRS[Math.floor(Math.random()*PAIRS.length)];
      const targetIdx=Math.floor(Math.random()*total_);
      for(let i=0;i<total_;i++){
        const c=el('div','vs-cell');
        c.textContent=(i===targetIdx?b_:a);
        if(i===targetIdx){ targetCell=c; c._target=true; }
        c.onclick=()=>{
          const rt=performance.now()-qStart;
          if(c._target){ correct++; times.push(rt); Sound.click(); buzz(15); c.style.color='var(--good)'; }
          else { Sound.bad(); buzz([30,40,30]); c.style.color='var(--warn)'; setTimeout(()=>c.style.color='#a59c87',300); return; }
          qIdx++;
          if(qIdx>=total) end(); else { setTimeout(makeQ,260); }
          const accNow=Math.round(correct/(qIdx)*100); $('#g-live').textContent=accNow+'%';
        };
        grid.appendChild(c);
      }
      qStart=performance.now();
      prog.textContent=String(qIdx+1).padStart(2,'0')+' / '+total;
    }
    function end(){ done=true;
      const acc=Math.round(correct/total*100);
      const avgRT=times.length?Math.round(times.reduce((a,c)=>a+c,0)/times.length):0;
      const E=T.searchEnd;
      let h;
      if(acc>=90 && avgRT<1500) h=E.good;
      else if(acc<70) h=E.bad;
      else h=E.mid;
      result({eyebrow:E.eyebrow,big:acc+'%',
        stats:[[E.s1,acc+'%'],[E.s2,(avgRT/1000).toFixed(1)+'s'],[E.s3,total]],handoff:h,gameId:'search',scoreVal:acc});
    }
    $('#timebar').style.visibility='hidden';
    makeQ();
  }
};

    r.innerHTML=`<h2>${R.h}</h2>

      <p>${R.p}</p>
      <div class="hint">${R.hint}</div>`;
    b.appendChild(r);
    const btn=el('button','btn primary',T.rulesStartShort); btn.onclick=()=>Breath.start(); r.appendChild(btn);
  },
  start(){ clearAll(); Sound.click(); Sound.init();
    const b=$('#gbody');b.innerHTML='';
    const pick=el('div',null); pick.style.cssText='display:flex;flex-direction:column;align-items:center;gap:1.2rem';
    pick.innerHTML=`<div style="font-size:.9rem;color:var(--dim)">${T.breathPick}</div>`;
    const row=el('div',null); row.style.cssText='display:flex;gap:.8rem';
    T.breathPickOpts.forEach(([k,l])=>{
      const btn=el('button','wander-btn',l); btn.style.marginTop='0';
      btn.onclick=()=>{Sound.click();if(k!=='none')Sound.startAmbient(k);Breath.run();};
      row.appendChild(btn);
    });
    pick.appendChild(row); b.appendChild(pick);
  },
  run(){ const b=$('#gbody');b.innerHTML='';
    const orb=el('div','br-orb-anim');
    const phase=el('div','br-phase',T.breathPhases.in);
    const cyc=el('div','br-cycle',T.breathCycle(1,6));
    b.appendChild(orb); b.appendChild(phase); b.appendChild(cyc);

    const CYCLES=6;
    let c=1, done=false;

    function phaseTick(){
      if(done)return;
      phase.textContent=T.breathPhases.in;
      window._to=setTimeout(()=>{ if(done)return; phase.textContent=T.breathPhases.hold;
        window._to2=setTimeout(()=>{ if(done)return; phase.textContent=T.breathPhases.out;
          window._to3=setTimeout(()=>{ if(done)return;
            c++;
            if(c>CYCLES){ end(); return; }
            cyc.textContent=T.breathCycle(c,CYCLES);
            phaseTick();
          }, 8000);
        }, 7000);
      }, 4000);
    }
    function end(){ done=true; Sound.stopAmbient();
      const E=T.breathEnd;
      result({eyebrow:E.eyebrow,big:'✓',
        stats:[[E.s1,CYCLES],[E.s2,E.dur]],
        handoff:E.good,gameId:'breath',scoreVal:null});
    }
    $('#timebar').style.visibility='hidden';
    phaseTick();
  }
};

/* ===================== TREND PAGE ===================== */
function renderTrend(){
  const w=$('#trendwrap'); w.innerHTML='';
  w.appendChild(el('div','trend-h',T.trendH));
  w.appendChild(el('div','trend-sub',T.trendSub));
  const trackable=GAMES.filter(g=>g.live&&g.unit==='%');
  let any=false;
  trackable.forEach(g=>{
    const data=DB.all(g.id); if(!data.length)return; any=true;
    const card=el('div','tcard');
    const best=DB.best(g.id), last=DB.last(g.id);
    const gName = (T.games[g.id] && T.games[g.id].name) || g.name;
    card.innerHTML=`<h4>${gName}<b>${last}${g.unit}</b></h4><div class="meta">${T.trendCount(data.length)} · ${T.trendBest} ${best}${g.unit}</div>`;
    const svg=sparkline(data.map(d=>d.v)); card.appendChild(svg);
    w.appendChild(card);
  });
  if(!any){ w.appendChild(el('div','empty',T.trendEmpty)); }
}
function sparkline(vals){
  const W=380,H=54,pad=4; const max=Math.max(...vals,100),min=Math.min(...vals,0);
  const xs=i=>vals.length<=1?W/2:pad+i*(W-2*pad)/(vals.length-1);
  const ys=v=>H-pad-((v-min)/((max-min)||1))*(H-2*pad);
  const ns='http://www.w3.org/2000/svg'; const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('class','spark'); svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  let d=''; vals.forEach((v,i)=>{d+=(i?'L':'M')+xs(i)+' '+ys(v)+' ';});
  const path=document.createElementNS(ns,'path'); path.setAttribute('d',d);
  path.setAttribute('fill','none');path.setAttribute('stroke','#c9b88a');path.setAttribute('stroke-width','1.6');
  path.setAttribute('stroke-linejoin','round');path.setAttribute('stroke-linecap','round');
  svg.appendChild(path);
  vals.forEach((v,i)=>{const c=document.createElementNS(ns,'circle');c.setAttribute('cx',xs(i));c.setAttribute('cy',ys(v));
    c.setAttribute('r',i===vals.length-1?3:1.8);c.setAttribute('fill',i===vals.length-1?'#ece7dd':'#c9b88a');svg.appendChild(c);});
  return svg;
}

/* film grain — static, drawn once on resize. animating it ate CPU on mobile. */
const cv=$('#noise'),cx=cv.getContext('2d');
function drawGrain(){
  cv.width=innerWidth;cv.height=innerHeight;
  const d=cx.createImageData(cv.width,cv.height),p=d.data;
  for(let i=0;i<p.length;i+=4){const v=Math.random()*255;p[i]=p[i+1]=p[i+2]=v;p[i+3]=255;}
  cx.putImageData(d,0,0);
}
drawGrain();
let _rsz; addEventListener('resize',()=>{clearTimeout(_rsz);_rsz=setTimeout(drawGrain,200);});
